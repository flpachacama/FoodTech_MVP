@if (visible && restaurante) {
  <div class="modal-container">
    <div class="modal-overlay" (click)="onOverlayClick($event)">
      <div class="modal-card" (click)="$event.stopPropagation()">
        <!-- Header -->
        <div class="modal-header">
          <h2 class="restaurante-nombre">{{ restaurante.nombre }}</h2>
          <button class="close-btn" (click)="onClose()" aria-label="Cerrar">
            ×
          </button>
        </div>

        <!-- Product List -->
        <div class="product-list">
          @if (restaurante.menu && restaurante.menu.length > 0) {
            @for (producto of restaurante.menu; track producto.id) {
              <div class="product-item">
                <div class="product-info">
                  <span class="product-nombre">{{ producto.nombre }}</span>
                  <span class="product-precio">{{ formatPrice(producto.precio) }} COP</span>
                </div>
                <button 
                  class="btn-agregar" 
                  (click)="onAgregarProducto(producto)"
                  [attr.aria-label]="'Agregar ' + producto.nombre">
                  Agregar
                </button>
              </div>
            }
          } @else {
            <p class="no-products">No hay productos disponibles</p>
          }
        </div>
      </div>
    </div>
  </div>
}
